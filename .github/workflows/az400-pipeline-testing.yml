name: AZ-400 Pipeline Testing Lab

on:
  pull_request:
    paths:
      - "AzureContainerRegistry/RickAndMorty/**"
      - "AzureContainerRegistry/RickAndMorty.Tests/**"
      - ".github/workflows/az400-pipeline-testing.yml"
      - "Labs/AZ400-03-Container-Runtime-Smoke-Test/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Build, test and collect coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: >
          dotnet restore
          AzureContainerRegistry/RickAndMorty.Tests/RickAndMorty.Tests.csproj

      - name: Build
        run: >
          dotnet build
          AzureContainerRegistry/RickAndMorty.Tests/RickAndMorty.Tests.csproj
          --configuration Release
          --no-restore

      - name: Run tests and collect coverage
        run: >
          dotnet test
          AzureContainerRegistry/RickAndMorty.Tests/RickAndMorty.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=tests.trx"
          --collect "XPlat Code Coverage"
          --results-directory TestResults

      - name: Upload test results and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-and-coverage
          path: TestResults
          if-no-files-found: error
          retention-days: 7

  container:
    name: Build and smoke-test container
    runs-on: ubuntu-latest
    needs: test
    env:
      IMAGE_NAME: rickandmorty:pr-${{ github.event.pull_request.number || github.run_number }}
      CONTAINER_NAME: rickandmorty-smoke-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build container image
        run: >
          docker build
          --file AzureContainerRegistry/RickAndMorty/dockerfile
          --tag "$IMAGE_NAME"
          AzureContainerRegistry/RickAndMorty

      - name: Start container
        run: >
          docker run
          --detach
          --name "$CONTAINER_NAME"
          --env ASPNETCORE_ENVIRONMENT=Testing
          --publish 8080:8080
          "$IMAGE_NAME"

      - name: Wait for API and run smoke test
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error \
              http://127.0.0.1:8080/weatherforecast \
              --output response.json; then
              jq --exit-status 'type == "array" and length == 5' response.json
              echo "Runtime smoke test passed on attempt $attempt."
              exit 0
            fi

            sleep 2
          done

          echo "The API did not become ready within 60 seconds."
          exit 1

      - name: Capture container logs on failure
        if: failure()
        run: docker logs "$CONTAINER_NAME"

      - name: Clean up container
        if: always()
        run: docker rm --force "$CONTAINER_NAME"
